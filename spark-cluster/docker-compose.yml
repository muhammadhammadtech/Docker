networks:
  spark-net:
    driver: bridge

services:
  spark-master:
    image: spark:3.5.7-scala2.12-java17-python3-ubuntu
    container_name: spark-master
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master
    ports:
      - "8080:8080"
      - "7077:7077"
    networks:
      - spark-net
    volumes:
      - ./workspace:/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 5

  spark-worker-1:
    image: spark:3.5.7-scala2.12-java17-python3-ubuntu
    container_name: spark-worker-1
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker -c 2 -m 2g spark://spark-master:7077
    networks:
      - spark-net
    volumes:
      - ./workspace:/workspace
    depends_on:
      - spark-master
    healthcheck:
      test: ["CMD", "pgrep", "-f", "Worker"]
      interval: 30s
      timeout: 10s
      retries: 5

  spark-worker-2:
    image: spark:3.5.7-scala2.12-java17-python3-ubuntu
    container_name: spark-worker-2
    user: root
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker -c 2 -m 2g spark://spark-master:7077
    networks:
      - spark-net
    volumes:
      - ./workspace:/workspace
    depends_on:
      - spark-master
    healthcheck:
      test: ["CMD", "pgrep", "-f", "Worker"]
      interval: 30s
      timeout: 10s
      retries: 5
