version: '3.8'

services:
  web:
    image: nginx:alpine
    ports:
      - "80:80"
    networks:
      - webapp-network
    deploy:
      replicas: 1
    configs:
      - source: nginx_config
        target: /etc/nginx/nginx.conf

  api:
    image: httpd:alpine
    networks:
      - webapp-network
      - backend-network
    deploy:
      replicas: 2
    environment:
      - SERVICE_NAME=api-service

  database:
    image: postgres:13-alpine
    networks:
      - backend-network
    environment:
      - POSTGRES_DB=webapp
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=secret123
    deploy:
      replicas: 1
    volumes:
      - db_data:/var/lib/postgresql/data

networks:
  webapp-network:
    external: true
  backend-network:
    external: true

volumes:
  db_data:

configs:
  nginx_config:
    external: true
