name: Docker CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Build test Docker image
        run: docker build --target testing -t ${{ secrets.DOCKER_USERNAME }}/docker-travis-ci-lab:test .

      - name: Build production Docker image
        run: |
          docker build --target production -t ${{ secrets.DOCKER_USERNAME }}/docker-travis-ci-lab:${{ github.run_number }} .
          docker build --target production -t ${{ secrets.DOCKER_USERNAME }}/docker-travis-ci-lab:latest .

      - name: Test production container
        run: |
          docker run -d -p 3000:3000 --name test-container ${{ secrets.DOCKER_USERNAME }}/docker-travis-ci-lab:latest
          sleep 15
          curl -f http://localhost:3000/health || exit 1
          curl -f http://localhost:3000 || exit 1
          docker logs test-container
          docker stop test-container
          docker rm test-container

      - name: Login to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push to Docker Hub
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/docker-travis-ci-lab:${{ github.run_number }}
          docker push ${{ secrets.DOCKER_USERNAME }}/docker-travis-ci-lab:latest
          echo "Successfully pushed to Docker Hub!"
