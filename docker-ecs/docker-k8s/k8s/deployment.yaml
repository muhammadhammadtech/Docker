apiVersion: apps/v1
kind: Deployment
metadata:
  name: docker-k8s-app
  labels:
    app: docker-k8s-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: docker-k8s-app
  template:
    metadata:
      labels:
        app: docker-k8s-app
    spec:
      containers:
      - name: docker-k8s-app
        image: docker-k8s-app:v1.0
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
