services:
  nginx-lb:
    image: nginx:alpine
    container_name: nginx-lb
    ports:
      - "80:80"
    volumes:
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - blue-green-network
    restart: unless-stopped

networks:
  blue-green-network:
    external: true
    name: blue-green-network
